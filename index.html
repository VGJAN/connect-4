<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connect 4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Connect 4</h1>
    </header>

    <main>
      <div id="scoreBoard">
        <div class="players">
          <p class="playerName" id="player1Name">Player 1</p>
          <p class="playerName" id="player2Name">Player 2</p>
        </div>
        <div class="scores">
          <p class="playerScore" id="player1Score"></p>
          <p class="divider">:</p>
          <p class="playerScore" id="player2Score"></p>
        </div>
      </div>
      <div class="boardWrapper">
        <div class="discLayer">
          <div class="disc" id="cursorDisc"></div>
        </div>
        <div class="gameBoard"></div>
      </div>
      <div class="gameControls">
        <div id="gameStatus"></div>
        <div id="resetBtn">
          <i class="fa-solid fa-rotate-right"></i>
        </div>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Connect 4 Game</p>
    </footer>

    <script src="js/app.js" defer></script>
  </body>
</html>
